<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ذكرى ضياء | منصة الصدقة الجارية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- خطوط عربية راقية -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi+Fun&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- particles.js للخلفية -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root {
            --bg-deep: #0b0714; /* بنفسجي غامق جداً */
            --bg-mid: #1b1236;  /* بنفسجي متوسط */
            --bg-light: #0f1b2d; /* أزرق غامق */
            --text-primary: #e6e0d3;
            --text-gold: #d4a017;
            --border-color: #4a3f6b;
            --card-bg: rgba(20, 15, 40, 0.85);
            --nav-bg: rgba(10, 5, 20, 0.9);
            --toast-bg: rgba(15, 10, 30, 0.95);
            --bead-color: #aaaaaa;
        }
        .light-mode {
            --bg-deep: #f3efe7;
            --bg-mid: #e8dcc8;
            --bg-light: #ddd0b8;
            --text-primary: #2e2a24;
            --text-gold: #8b6914;
            --border-color: #c0a070;
            --card-bg: rgba(255, 250, 240, 0.9);
            --nav-bg: rgba(245, 240, 230, 0.9);
            --toast-bg: rgba(245, 240, 230, 0.95);
            --bead-color: #8b7d6b;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(ellipse at 50% 0%, var(--bg-mid), var(--bg-deep));
            color: var(--text-primary);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.6s, color 0.6s;
        }
        .holy-glow {
            color: var(--text-gold);
            text-shadow: 0 0 25px rgba(212, 160, 23, 0.7);
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
        }
        .nav-btn {
            transition: all 0.2s ease;
            color: #b0aac0;
        }
        .nav-btn.active {
            color: var(--text-gold);
            transform: translateY(-3px);
            filter: drop-shadow(0 0 10px var(--text-gold));
        }
        #toast {
            visibility: hidden;
            min-width: 280px;
            background: var(--toast-bg);
            color: var(--text-gold);
            text-align: center;
            border-radius: 50px;
            padding: 12px 28px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 90px;
            transform: translateX(-50%);
            font-weight: bold;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
            white-space: nowrap;
            transition: visibility 0s 0.3s, opacity 0.3s;
        }
        #toast.show {
            visibility: visible; opacity: 1;
            animation: toastFade 3.5s forwards;
        }
        @keyframes toastFade {
            0% { opacity: 0; bottom: 70px; }
            15% { opacity: 1; bottom: 90px; }
            85% { opacity: 1; bottom: 90px; }
            100% { opacity: 0; bottom: 70px; }
        }
        /* مسبحة دائرية */
        .tasbih-circle {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 40px auto;
        }
        .tasbih-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        .bead-circle {
            transition: transform 0.15s ease, fill 0.2s;
            cursor: pointer;
        }
        .pulse-animation {
            animation: pulseGlow 1.2s infinite alternate;
        }
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 4px gold); }
            to { filter: drop-shadow(0 0 14px gold); }
        }
        .search-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
        }
        .fade-in {
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* حركات مخصصة للمسبحة */
        .bead-active { fill: #ffd700; stroke: #ffaa00; stroke-width: 1px; }
    </style>
</head>
<body class="dark">
    <!-- خلفية الجسيمات -->
    <div id="particles-js" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;"></div>
    <!-- شاشة البداية -->
    <div id="preloader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black" style="transition: opacity 0.8s;">
        <h1 class="text-7xl font-bold text-yellow-500" style="font-family: 'Aref Ruqaa';">ذِكرَىٰ ضِيَاء</h1>
        <div class="h-1 w-36 mx-auto mt-4 bg-gradient-to-r from-transparent via-yellow-600 to-transparent"></div>
        <p class="text-gray-400 text-2xl mt-6">صَدَقَةٌ جَارِيَة</p>
        <p class="text-gray-600 text-sm mt-8">اللَّهُمَّ اغْفِرْ لِضِيَاءِ الدِّينِ صَالِح الزعبِي وَارْحَمْهُ</p>
    </div>
    <!-- التطبيق الرئيسي -->
    <main id="app" class="relative z-10 invisible opacity-0 transition-all duration-700 pb-24">
        <div id="dynamic-content" class="px-4 max-w-4xl mx-auto pt-8"></div>
    </main>
    <!-- شريط التنقل السفلي -->
    <nav class="fixed bottom-5 left-0 right-0 mx-auto w-11/12 max-w-3xl backdrop-blur-xl rounded-full border border-purple-800/60 shadow-2xl z-40 px-4 py-3 flex justify-between items-center text-sm" style="background: var(--nav-bg);">
        <button onclick="navigate('home')" class="nav-btn flex flex-col items-center" id="nav-home"><i class="fas fa-home text-xl"></i><span>الرئيسية</span></button>
        <button onclick="navigate('quran')" class="nav-btn flex flex-col items-center" id="nav-quran"><i class="fas fa-quran text-xl"></i><span>القرآن</span></button>
        <button onclick="navigate('hadith')" class="nav-btn flex flex-col items-center" id="nav-hadith"><i class="fas fa-book-open text-xl"></i><span>الحديث</span></button>
        <button onclick="navigate('adhkar')" class="nav-btn flex flex-col items-center" id="nav-adhkar"><i class="fas fa-seedling text-xl"></i><span>الأذكار</span></button>
        <button onclick="navigate('qibla')" class="nav-btn flex flex-col items-center" id="nav-qibla"><i class="fas fa-kaaba text-xl"></i><span>القبلة</span></button>
        <button onclick="navigate('tasbih')" class="nav-btn flex flex-col items-center" id="nav-tasbih"><i class="fas fa-hands-praying text-xl"></i><span>المسبحة</span></button>
        <button onclick="navigate('dua')" class="nav-btn flex flex-col items-center" id="nav-dua"><i class="fas fa-hand-holding-heart text-xl"></i><span>الدعاء</span></button>
    </nav>
    <!-- أزرار عائمة -->
    <div class="fixed top-5 left-5 z-50 flex gap-3">
        <button onclick="toggleTheme()" class="bg-black/50 backdrop-blur text-yellow-400 p-2 rounded-full shadow-xl"><i id="theme-icon" class="fas fa-moon text-xl"></i></button>
        <button onclick="navigate('settings')" class="bg-black/50 backdrop-blur text-yellow-400 p-2 rounded-full shadow-xl"><i class="fas fa-cog text-xl"></i></button>
        <button onclick="navigate('donate')" class="bg-black/50 backdrop-blur text-yellow-400 p-2 rounded-full shadow-xl"><i class="fas fa-donate text-xl"></i></button>
    </div>
    <!-- توست -->
    <div id="toast"></div>

    <script>
        // ====================== الجسيمات ======================
        particlesJS('particles-js', {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: '#d4a017' }, shape: { type: 'circle' },
                opacity: { value: 0.4, random: true }, size: { value: 2, random: true },
                line_linked: { enable: false }, move: { enable: true, speed: 0.4, direction: 'none', random: true, out_mode: 'out' }
            },
            interactivity: { events: { onhover: { enable: false }, onclick: { enable: false }, resize: true } }, retina_detect: true
        });

        // ====================== إظهار التطبيق ======================
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('preloader').style.display = 'none';
                    document.getElementById('app').classList.remove('invisible', 'opacity-0');
                    navigate('home');
                }, 800);
            }, 2500);
        });

        // ====================== الثيمات ======================
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('light-mode')) {
                icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'light');
            } else {
                icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'dark');
            }
        }
        (function() {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('theme-icon').classList.remove('fa-moon'); document.getElementById('theme-icon').classList.add('fa-sun');
            }
        })();

        // ====================== إشعارات ======================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'show';
            setTimeout(() => toast.className = '', 3500);
        }

        // ====================== التنقل ======================
        function navigate(page) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const nav = document.getElementById(`nav-${page}`);
            if (nav) nav.classList.add('active');
            const container = document.getElementById('dynamic-content');
            container.classList.remove('fade-in');
            void container.offsetWidth;
            container.classList.add('fade-in');
            switch(page) {
                case 'home': container.innerHTML = renderHome(); break;
                case 'quran': container.innerHTML = renderQuran(); initQuran(); break;
                case 'hadith': container.innerHTML = renderHadith(); initHadith(); break;
                case 'adhkar': container.innerHTML = renderAdhkar(); break;
                case 'qibla': container.innerHTML = renderQibla(); initQibla(); break;
                case 'tasbih': container.innerHTML = renderTasbih(); initTasbih(); break;
                case 'dua': container.innerHTML = renderDua(); break;
                case 'settings': container.innerHTML = renderSettings(); break;
                case 'donate': container.innerHTML = renderDonate(); break;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ====================== الصفحة الرئيسية ======================
        function renderHome() {
            return `
            <div class="text-center">
                <h2 class="holy-glow text-4xl md:text-7xl font-bold mb-6">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</h2>
                <p class="text-3xl text-gray-300 mb-8">إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ</p>
                <div class="flex items-center justify-center gap-3 opacity-80"><span class="w-16 h-px bg-gradient-to-l from-transparent to-yellow-700"></span><i class="fas fa-star text-yellow-600"></i><span class="w-16 h-px bg-gradient-to-r from-transparent to-yellow-700"></span></div>
                <p class="mt-6 text-gray-400 text-lg">صدقة جارية عن روح <strong class="text-yellow-300">المرحوم ضياء الدين صالح الزعبي</strong></p>
                <div class="my-14 inline-block p-8 bg-gradient-to-b from-transparent via-purple-900/20 to-transparent rounded-full border border-yellow-500/30">
                    <h1 class="text-6xl md:text-8xl font-bold" style="font-family: 'Aref Ruqaa'; color:var(--text-gold);">ذِكرَىٰ<br>ضِيَاء</h1>
                </div>
            </div>`;
        }

        // ====================== القرآن ======================
        const quranReciters = {
            "abdul_basit": { name: "عبد الباسط عبد الصمد", base: "https://everyayah.com/data/Abdul_Basit_Mujawwad_128kbps/" },
            "sudais": { name: "عبد الرحمن السديس", base: "https://everyayah.com/data/Abdurrahmaan_As-Sudais_192kbps/" },
            "afasy": { name: "مشاري العفاسي", base: "https://everyayah.com/data/Alafasy_128kbps/" },
            "minshawi": { name: "محمد صديق المنشاوي", base: "https://everyayah.com/data/Minshawi_Mujawwad_192kbps/" }
        };
        let currentReciter = 'abdul_basit';

        function renderQuran() {
            return `
            <div>
                <h2 class="holy-glow text-3xl mb-6">القرآن الكريم</h2>
                <div class="flex flex-wrap gap-3 mb-4">
                    <select id="surahSelect" class="bg-black/30 p-2 rounded" onchange="loadSurah()"></select>
                    <select id="reciterSelect" class="bg-black/30 p-2 rounded" onchange="changeReciter()">
                        ${Object.entries(quranReciters).map(([k, v]) => `<option value="${k}">${v.name}</option>`).join('')}
                    </select>
                </div>
                <div class="flex flex-wrap gap-3 mb-4">
                    <input type="text" id="quranSearch" placeholder="بحث: آية، سورة، جزء..." class="search-box p-2 rounded flex-1 min-w-[200px]" onkeyup="searchQuran()">
                    <button onclick="searchByPage()" class="bg-purple-800/40 px-4 py-2 rounded-full">صفحة</button>
                    <button onclick="searchByJuz()" class="bg-purple-800/40 px-4 py-2 rounded-full">جزء</button>
                </div>
                <div id="quranDisplay" class="space-y-6"></div>
            </div>`;
        }

        function initQuran() {
            const select = document.getElementById('surahSelect');
            fetch('https://api.alquran.cloud/v1/surah')
                .then(r => r.json())
                .then(data => {
                    data.data.forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.number; opt.text = `${s.number}. ${s.name}`;
                        select.appendChild(opt);
                    });
                    select.value = 1;
                    loadSurah();
                });
            document.getElementById('reciterSelect').value = currentReciter;
        }

        function changeReciter() {
            currentReciter = document.getElementById('reciterSelect').value;
        }

        function loadSurah() {
            const surah = document.getElementById('surahSelect').value;
            fetch(`https://api.alquran.cloud/v1/surah/${surah}/quran-uthmani`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('quranDisplay');
                    container.innerHTML = '';
                    data.data.ayahs.forEach(ayah => {
                        const div = document.createElement('div');
                        div.className = 'card p-4';
                        let text = ayah.text;
                        // فصل البسملة عن الآية الأولى
                        if (ayah.numberInSurah === 1 && text.startsWith('بِسْمِ')) {
                            const idx = text.indexOf('ٱللَّهِ');
                            const bism = text.substring(0, idx + 6); // تقريباً
                            const rest = text.substring(idx + 6);
                            div.innerHTML = `<span class="text-2xl text-yellow-400 font-bold block mb-2" style="font-family: 'Amiri Quran';">${bism}</span><p class="text-2xl leading-loose" style="font-family: 'Amiri Quran';">${rest}</p>`;
                        } else {
                            div.innerHTML = `<p class="text-2xl leading-loose" style="font-family: 'Amiri Quran';">${text}</p>`;
                        }
                        // زر التلاوة
                        const audioBtn = document.createElement('button');
                        audioBtn.className = 'text-xs text-yellow-500 mt-2 mr-2';
                        audioBtn.innerHTML = '<i class="fas fa-play"></i> استمع';
                        audioBtn.onclick = () => playAyah(ayah.number);
                        div.appendChild(audioBtn);
                        // زر التفسير
                        const tafsirBtn = document.createElement('button');
                        tafsirBtn.className = 'text-xs text-yellow-500 mt-2';
                        tafsirBtn.textContent = 'تفسير';
                        tafsirBtn.onclick = () => loadTafsir(ayah.number, div);
                        div.appendChild(tafsirBtn);
                        container.appendChild(div);
                    });
                });
        }

        function playAyah(ayahNumber) {
            const base = quranReciters[currentReciter].base;
            const audio = new Audio(`${base}${String(ayahNumber).padStart(3, '0')}.mp3`);
            audio.play();
            showToast('جاري تشغيل التلاوة');
        }

        function loadTafsir(ayahNumber, parentDiv) {
            fetch(`https://api.alquran.cloud/v1/ayah/${ayahNumber}/ar.muyassar`)
                .then(r => r.json())
                .then(data => {
                    const old = parentDiv.querySelector('.tafsir');
                    if (old) old.remove();
                    const p = document.createElement('p');
                    p.className = 'tafsir text-sm text-gray-300 mt-2 border-t border-gray-700 pt-2';
                    p.textContent = `التفسير الميسر: ${data.data.text}`;
                    parentDiv.appendChild(p);
                });
        }

        function searchQuran() {
            const query = document.getElementById('quranSearch').value.trim();
            if (query.length < 2) return;
            fetch(`https://api.alquran.cloud/v1/search/${query}/all/en`)
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('quranDisplay');
                    if (data.data.matches.length) {
                        container.innerHTML = '<h3 class="text-yellow-300 mb-4">نتائج البحث:</h3>';
                        data.data.matches.slice(0, 15).forEach(m => {
                            container.innerHTML += `<div class="card p-3 my-2">${m.text}</div>`;
                        });
                    } else {
                        container.innerHTML = '<p>لا توجد نتائج.</p>';
                    }
                });
        }

        function searchByPage() {
            const page = prompt('أدخل رقم الصفحة (المصحف المدني):');
            if (page) {
                fetch(`https://api.alquran.cloud/v1/page/${page}/quran-uthmani`)
                    .then(r => r.json())
                    .then(data => {
                        const container = document.getElementById('quranDisplay');
                        container.innerHTML = `<h3 class="text-yellow-300">الصفحة ${page}</h3>`;
                        data.data.ayahs.forEach(a => {
                            container.innerHTML += `<p class="text-xl my-2">${a.text}</p>`;
                        });
                    });
            }
        }

        function searchByJuz() {
            const juz = prompt('أدخل رقم الجزء:');
            if (juz) {
                fetch(`https://api.alquran.cloud/v1/juz/${juz}/quran-uthmani`)
                    .then(r => r.json())
                    .then(data => {
                        const container = document.getElementById('quranDisplay');
                        container.innerHTML = `<h3 class="text-yellow-300">الجزء ${juz}</h3>`;
                        data.data.ayahs.forEach(a => {
                            container.innerHTML += `<p class="text-xl my-2">${a.text}</p>`;
                        });
                    });
            }
        }

        // ====================== الأحاديث (40 صحيحة + بحث) ======================
        const ahadith = [
            { text: "إنَّما الأعْمالُ بالنِّيَّاتِ، وإنَّما لِكُلِّ امْرِئٍ ما نَوَى، فمَن كانَتْ هِجْرَتُهُ إلى دُنيا يُصِيبُها، أوْ إلى امْرَأَةٍ يَنْكِحُها، فَهِجْرَتُهُ إلى ما هاجَرَ إلَيْهِ.", source: "البخاري ومسلم", grade: "صحيح" },
            { text: "مَن سَنَّ في الإسْلامِ سُنَّةً حَسَنَةً، فَلَهُ أجْرُها، وأَجْرُ مَن عَمِلَ بها بَعْدَهُ، مِن غيرِ أنْ يَنْقُصَ مِن أُجُورِهِمْ شَيءٌ.", source: "مسلم", grade: "صحيح" },
            { text: "المُسْلِمُ مَن سَلِمَ المُسْلِمُونَ مِن لِسانِهِ ويَدِهِ، والمُهاجِرُ مَن هَجَرَ ما نَهَى اللَّهُ عنْه.", source: "البخاري", grade: "صحيح" },
            { text: "لا يُؤْمِنُ أحَدُكُمْ حتَّى يُحِبَّ لأَخِيهِ ما يُحِبُّ لِنَفْسِهِ.", source: "البخاري ومسلم", grade: "صحيح" },
            { text: "مَن كانَ يُؤْمِنُ باللَّهِ واليَومِ الآخِرِ فَلْيَقُلْ خَيْرًا أوْ لِيَصْمُتْ.", source: "البخاري ومسلم", grade: "صحيح" },
            { text: "اتَّقِ اللَّهَ حَيْثُما كُنْتَ، وأَتْبِعِ السَّيِّئَةَ الحَسَنَةَ تَمْحُها، وخالِقِ النَّاسَ بِخُلُقٍ حَسَنٍ.", source: "الترمذي", grade: "حسن" },
            { text: "الرَّاحِمُونَ يَرْحَمُهُمُ الرَّحْمَنُ، ارْحَمُوا مَن في الأرْضِ يَرْحَمْكُمْ مَن في السَّماءِ.", source: "أبو داود والترمذي", grade: "صحيح" },
            { text: "خَيْرُكُمْ مَن تَعَلَّمَ القُرْآنَ وعَلَّمَهُ.", source: "البخاري", grade: "صحيح" },
            { text: "ليسَ الشَّدِيدُ بالصُّرَعَةِ، إنَّما الشَّدِيدُ الذي يَمْلِكُ نَفْسَهُ عِنْدَ الغَضَبِ.", source: "البخاري ومسلم", grade: "صحيح" },

                    clearInterval(interval);
                    btn.textContent = 'تم';
                    showToast('أهديتَ ثواب هذا الذكر للمرحوم ضياء الدين');
                    btn.disabled = false;
                }
            }, 1000);
        }

        // ====================== القبلة ======================
        function renderQibla() {
            return `
            <div class="text-center fade-in">
                <h2 class="holy-glow text-3xl mb-8">اتجاه القبلة</h2>
                <div class="relative w-72 h-72 mx-auto bg-black/30 rounded-full border-4 border-yellow-700 flex items-center justify-center" id="compass">
                    <div id="compassInner" class="relative w-full h-full">
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl">🕋</div>
                        <div id="needle" class="absolute top-0 left-1/2 w-1 h-1/2 bg-yellow-400 origin-bottom transform -translate-x-1/2" style="transition: transform 0.3s;"></div>
                    </div>
                </div>
                <p id="qiblaStatus" class="mt-4 text-yellow-300">اضغط لتحديث الاتجاه</p>
                <button onclick="requestQibla()" class="bg-yellow-800/40 px-6 py-2 rounded-full mt-4">تحديث</button>
            </div>`;
        }

        function initQibla() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', handleOrientation, true);
            } else {
                document.getElementById('qiblaStatus').textContent = 'المتصفح لا يدعم البوصلة، سيتم تقريب الاتجاه.';
            }
        }

        function handleOrientation(event) {
            let alpha = event.webkitCompassHeading || Math.abs(event.alpha - 360);
            if (alpha < 0) alpha += 360;
            const qiblaBearing = calculateQibla(21.4225, 39.8262); // مكة
            const needle = document.getElementById('needle');
            if (needle) {
                const rotation = alpha - qiblaBearing;
                needle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
            }
            document.getElementById('qiblaStatus').textContent = `زاوية القبلة: ${qiblaBearing.toFixed(1)}°`;
        }

        function calculateQibla(lat, lng) {
            // صيغة حساب القبلة
            const deltaLng = 39.8262 - lng;
            const y = Math.sin(deltaLng * Math.PI/180) * Math.cos(21.4225 * Math.PI/180);
            const x = Math.cos(lat * Math.PI/180) * Math.sin(21.4225 * Math.PI/180) -
                      Math.sin(lat * Math.PI/180) * Math.cos(21.4225 * Math.PI/180) * Math.cos(deltaLng * Math.PI/180);
            let bearing = Math.atan2(y, x) * 180/Math.PI;
            bearing = (bearing + 360) % 360;
            return bearing;
        }

        function requestQibla() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const userLat = pos.coords.latitude;
                    const userLng = pos.coords.longitude;
                    const qibla = calculateQibla(userLat, userLng);
                    document.getElementById('qiblaStatus').textContent = `القبلة على بُعد ${qibla.toFixed(1)}° من الشمال`;
                    // محاكاة حركة السهم
                    const needle = document.getElementById('needle');
                    if (needle) needle.style.transform = `translateX(-50%) rotate(${qibla}deg)`;
                }, () => {
                    showToast('تعذر الوصول للموقع');
                });
            }
        }

        // ====================== المسبحة الدائرية (محاكاة تطبيق أنا مسلم) ======================
        function renderTasbih() {
            return `
            <div class="text-center fade-in">
                <h2 class="holy-glow text-3xl mb-6">المسبحة الإلكترونية</h2>
                <select id="dhikrPhrase" class="bg-black/30 p-2 rounded mb-4">
                    <option>سبحان الله</option><option>الحمد لله</option><option>لا إله إلا الله</option>
                    <option>الله أكبر</option><option>أستغفر الله</option><option>لا حول ولا قوة إلا بالله</option>
                    <option>سبحان الله وبحمده</option><option>سبحان الله العظيم</option>
                    <option>حسبي الله ونعم الوكيل</option><option>اللهم صل على محمد</option>
                    <option>يا حي يا قيوم برحمتك أستغيث</option>
                </select>
                <div class="tasbih-circle" id="tasbihCircle"></div>
                <div class="text-2xl text-yellow-300 my-2" id="counter">0 / 33</div>
                <button id="tapBtn" class="bg-purple-800/50 px-10 py-4 rounded-full text-xl font-bold pulse-animation">سَبِّح</button>
                <p class="text-sm mt-2">أهديت <span id="rewardCount">0</span> مرة</p>
            </div>`;
        }

        function initTasbih() {
            const circleDiv = document.getElementById('tasbihCircle');
            circleDiv.innerHTML = '';
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 110 110");
            // مسار دائري
            const path = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            path.setAttribute("cx", "55"); path.setAttribute("cy", "55"); path.setAttribute("r", "48");
            path.setAttribute("fill", "none"); path.setAttribute("stroke", "#4a3f6b"); path.setAttribute("stroke-width", "1");
            svg.appendChild(path);
            // 33 خرزة
            for(let i = 0; i < 33; i++) {
                const angle = (i / 33) * 2 * Math.PI;
                const x = 55 + 45 * Math.cos(angle);
                const y = 55 + 45 * Math.sin(angle);
                const bead = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                bead.setAttribute("cx", x); bead.setAttribute("cy", y); bead.setAttribute("r", "3.5");
                bead.setAttribute("fill", "var(--bead-color)");
                bead.setAttribute("class", "bead-circle");
                bead.dataset.index = i;
                svg.appendChild(bead);
            }
            // مؤشر متحرك
            const indicator = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            indicator.setAttribute("cx", "100"); indicator.setAttribute("cy", "55"); indicator.setAttribute("r", "6");
            indicator.setAttribute("fill", "none"); indicator.setAttribute("stroke", "gold"); indicator.setAttribute("stroke-width", "2");
            indicator.id = "indicator";
            svg.appendChild(indicator);
            circleDiv.appendChild(svg);

            let currentBead = 0, rewards = 0;
            const beads = document.querySelectorAll('.bead-circle');
            document.getElementById('tapBtn').onclick = () => {
                if (currentBead >= 33) return;
                // إعادة الخرزة السابقة
                if (currentBead > 0) beads[currentBead-1].setAttribute("fill", "var(--bead-color)");
                // تنشيط الحالية
                beads[currentBead].setAttribute("fill", "gold");
                beads[currentBead].classList.add('bead-active');
                currentBead++;
                document.getElementById('counter').textContent = currentBead + " / 33";
                // صوت
                playTick();
                if (currentBead === 33) {
                    rewards++;
                    document.getElementById('rewardCount').textContent = rewards;
                    showToast("أهديت ثواب التسبيح للمرحوم ضياء الدين");
                    setTimeout(() => {
                        beads.forEach(b => b.setAttribute("fill", "var(--bead-color)"));
                        currentBead = 0;
                        document.getElementById('counter').textContent = "0 / 33";
                    }, 800);
                }
            };
        }

        function playTick() {
            if (localStorage.getItem('sound') === 'false') return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 1600;
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.08);
                osc.start(); osc.stop(ctx.currentTime + 0.08);
            } catch(e){}
        }

            "دخول المسجد": ["بِسْمِ اللَّهِ وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ اللَّهِ... اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ"],
            "الخروج من المسجد": ["اللَّهُمَّ إِنِّي أَسْأَلُكَ مِنْ فَضْلِكَ"],
            "عند الأذان": ["اللَّهُمَّ رَبَّ هَذِهِ الدَّعْوَةِ التَّامَّةِ..."],
            // أضف كل الأدعية التي تريدها
        };

        function renderDua() {
            return `
            <div class="fade-in">
                <h2 class="holy-glow text-3xl mb-6">الدعاء</h2>
                <div class="flex flex-wrap gap-3 mb-4">
