<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ذكرى ضياء | منصة الصدقة الجارية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Aref+Ruqaa+Ink:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root {
            --bg-deep: #06040f;
            --bg-mid: #0f0a1e;
            --bg-light: #160f2e;
            --text-primary: #ede6d5;
            --text-muted: #8a8098;
            --text-gold: #d4a017;
            --gold-bright: #f0c040;
            --gold-dim: #8b6210;
            --border-color: #3a2f58;
            --border-gold: rgba(212,160,23,0.3);
            --card-bg: rgba(15, 10, 30, 0.88);
            --card-border: rgba(80, 60, 110, 0.6);
            --nav-bg: rgba(8, 4, 18, 0.92);
            --toast-bg: rgba(10, 6, 22, 0.96);
            --bead-color: #9090a8;
            --accent-purple: #6d28d9;
        }
        .light-mode {
            --bg-deep: #f0ece2;
            --bg-mid: #e5ddc8;
            --bg-light: #d8cdb5;
            --text-primary: #1e1a14;
            --text-muted: #6b5f48;
            --text-gold: #7a5808;
            --gold-bright: #c49020;
            --gold-dim: #c49020;
            --border-color: #c0a870;
            --border-gold: rgba(122,88,8,0.3);
            --card-bg: rgba(255, 252, 242, 0.92);
            --card-border: rgba(180,150,90,0.5);
            --nav-bg: rgba(240, 236, 226, 0.95);
            --toast-bg: rgba(240, 235, 220, 0.97);
            --bead-color: #8b7d6b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.6s, color 0.6s;
        }

        /* Geometric bg pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(109,40,217,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 100% 80%, rgba(212,160,23,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .holy-glow {
            color: var(--text-gold);
            text-shadow: 0 0 30px rgba(212,160,23,0.5), 0 0 60px rgba(212,160,23,0.2);
        }

        .gold-text { color: var(--text-gold); }

        /* Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 1.25rem;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            border-color: var(--border-gold);
            box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--border-gold);
        }

        /* Nav */
        nav.bottom-nav {
            background: var(--nav-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
        }
        .nav-btn {
            transition: all 0.25s ease;
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 11px;
        }
        .nav-btn:hover { color: var(--text-primary); }
        .nav-btn.active {
            color: var(--text-gold);
            background: rgba(212,160,23,0.1);
        }
        .nav-btn.active i {
            filter: drop-shadow(0 0 8px var(--text-gold));
        }

        /* Toast */
        #toast {
            visibility: hidden;
            background: var(--toast-bg);
            color: var(--text-gold);
            text-align: center;
            border-radius: 50px;
            padding: 11px 28px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 100px;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border-gold);
            box-shadow: 0 6px 40px rgba(0,0,0,0.7);
            white-space: nowrap;
            max-width: 90vw;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }
        #toast.show {
            visibility: visible;
            animation: toastFade 3.5s forwards;
        }
        @keyframes toastFade {
            0%   { opacity: 0; bottom: 80px; }
            15%  { opacity: 1; bottom: 100px; }
            80%  { opacity: 1; bottom: 100px; }
            100% { opacity: 0; bottom: 80px; }
        }

        /* Preloader */
        #preloader {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #06040f;
            transition: opacity 1s ease;
        }
        .preloader-ornament {
            width: 120px; height: 120px;
            border: 1px solid rgba(212,160,23,0.3);
            border-radius: 50%;
            animation: ornamentSpin 8s linear infinite;
            position: absolute;
        }
        .preloader-ornament::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(212,160,23,0.15);
            border-radius: 50%;
        }
        @keyframes ornamentSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .preloader-inner { position: relative; text-align: center; }

        /* Animations */
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Pulse for tasbih btn */
        .pulse-btn {
            animation: pulseBeat 2s ease-in-out infinite;
        }
        @keyframes pulseBeat {
            0%,100% { box-shadow: 0 0 0 0 rgba(212,160,23,0.3); }
            50%      { box-shadow: 0 0 0 16px rgba(212,160,23,0); }
        }

        /* Tasbih */
        .tasbih-circle { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .tasbih-circle svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .bead-circle { transition: fill 0.15s ease, r 0.15s ease; cursor: pointer; }

        /* Search box */
        .search-box {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--text-gold); }
        .search-box::placeholder { color: var(--text-muted); }

        /* Islamic divider */
        .divider {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-gold); margin: 12px 0;
            opacity: 0.6;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, var(--text-gold), transparent);
        }

        /* Toggle switch */
        .toggle-wrapper { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0; cursor: pointer;
            background: rgba(255,255,255,0.15); border-radius: 26px;
            transition: 0.3s;
        }
        .toggle-slider:before {
            content: ''; position: absolute;
            height: 20px; width: 20px; left: 3px; bottom: 3px;
            background: white; border-radius: 50%; transition: 0.3s;
        }
        .toggle input:checked + .toggle-slider { background: var(--text-gold); }
        .toggle input:checked + .toggle-slider:before { transform: translateX(22px); }

        /* Prayer time cards */
        .prayer-card {
            background: rgba(212,160,23,0.06);
            border: 1px solid rgba(212,160,23,0.15);
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            transition: all 0.2s;
            flex: 1;
        }
        .prayer-card.next-prayer {
            background: rgba(212,160,23,0.15);
            border-color: rgba(212,160,23,0.5);
            box-shadow: 0 0 20px rgba(212,160,23,0.1);
        }

        /* Progress bar */
        .dhikr-progress {
            height: 3px; background: rgba(255,255,255,0.1);
            border-radius: 3px; overflow: hidden; margin-top: 8px;
        }
        .dhikr-progress-fill {
            height: 100%; background: var(--text-gold);
            border-radius: 3px; transition: width 0.3s ease;
            width: 0%;
        }

        /* Quran ayah number badge */
        .ayah-num {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(212,160,23,0.15); border: 1px solid rgba(212,160,23,0.3);
            font-size: 12px; color: var(--text-gold); flex-shrink: 0;
        }

        /* Audio controls */
        .audio-ctrl {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(212,160,23,0.1); border: 1px solid rgba(212,160,23,0.2);
            border-radius: 20px; padding: 4px 12px; font-size: 12px;
            color: var(--text-gold); cursor: pointer;
            transition: background 0.2s;
        }
        .audio-ctrl:hover { background: rgba(212,160,23,0.2); }

        /* Compass */
        .compass-ring {
            width: 260px; height: 260px; position: relative; margin: 0 auto;
            border: 2px solid var(--border-gold);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,160,23,0.04) 0%, transparent 70%);
            box-shadow: 0 0 40px rgba(212,160,23,0.1), inset 0 0 40px rgba(0,0,0,0.4);
        }
        .compass-ring::before {
            content: '';
            position: absolute; inset: 10px;
            border: 1px solid rgba(212,160,23,0.15);
            border-radius: 50%;
        }

        /* Category pills */
        .cat-pill {
            background: rgba(109,40,217,0.2);
            border: 1px solid rgba(109,40,217,0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-pill:hover, .cat-pill.active {
            background: rgba(212,160,23,0.15);
            border-color: rgba(212,160,23,0.4);
            color: var(--text-gold);
        }

        /* Scroll bar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* Stagger fade-in for lists */
        .stagger > * { opacity: 0; animation: fadeIn 0.4s ease forwards; }
        .stagger > *:nth-child(1) { animation-delay: 0.05s; }
        .stagger > *:nth-child(2) { animation-delay: 0.1s; }
        .stagger > *:nth-child(3) { animation-delay: 0.15s; }
        .stagger > *:nth-child(4) { animation-delay: 0.2s; }
        .stagger > *:nth-child(5) { animation-delay: 0.25s; }
        .stagger > *:nth-child(n+6) { animation-delay: 0.3s; }

        /* Donation */
        .form-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 10px 14px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--text-gold); }
        .form-input option { background: #0f0a1e; }

        .btn-gold {
            background: linear-gradient(135deg, #8b6210, #d4a017, #8b6210);
            background-size: 200% 100%;
            background-position: right;
            border: none; border-radius: 50px;
            color: #06040f; font-weight: 700;
            padding: 12px 32px; cursor: pointer;
            transition: background-position 0.4s ease, transform 0.15s;
        }
        .btn-gold:hover {
            background-position: left;
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border-gold);
            border-radius: 50px;
            color: var(--text-gold);
            padding: 7px 18px; cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-ghost:hover { background: rgba(212,160,23,0.1); }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 400% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <!-- Particles background -->
    <div id="particles-js" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></div>

    <!-- Preloader -->
    <div id="preloader">
        <div class="preloader-inner">
            <div class="preloader-ornament"></div>
            <h1 style="font-family:'Aref Ruqaa Ink';font-size:4.5rem;color:#d4a017;text-shadow:0 0 40px rgba(212,160,23,0.5);position:relative;z-index:1;line-height:1.2;" class="mb-3">ذِكرَىٰ<br>ضِيَاء</h1>
            <div style="height:1px;width:120px;margin:0 auto;background:linear-gradient(90deg,transparent,#d4a017,transparent);"></div>
            <p style="color:#6b5f80;margin-top:16px;font-size:1.1rem;">صَدَقَةٌ جَارِيَة</p>
            <p style="color:#3d3450;font-size:0.75rem;margin-top:24px;max-width:260px;line-height:1.7;">اللَّهُمَّ اغْفِرْ لِضِيَاءِ الدِّينِ صَالِح الزعبِي وَارْحَمْهُ</p>
        </div>
    </div>

    <!-- App -->
    <main id="app" class="relative z-10 invisible opacity-0 transition-all duration-700 pb-28">
        <div id="dynamic-content" class="px-4 max-w-xl mx-auto pt-8"></div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav fixed bottom-4 left-0 right-0 mx-auto w-11/12 max-w-lg rounded-2xl shadow-2xl z-40 px-2 py-2 flex justify-around items-center">
        <button onclick="navigate('home')"    class="nav-btn flex flex-col items-center" id="nav-home">   <i class="fas fa-home text-lg"></i>   <span>الرئيسية</span></button>
        <button onclick="navigate('quran')"   class="nav-btn flex flex-col items-center" id="nav-quran">  <i class="fas fa-quran text-lg"></i>  <span>القرآن</span></button>
        <button onclick="navigate('hadith')"  class="nav-btn flex flex-col items-center" id="nav-hadith"> <i class="fas fa-book-open text-lg"></i><span>الحديث</span></button>
        <button onclick="navigate('adhkar')"  class="nav-btn flex flex-col items-center" id="nav-adhkar"> <i class="fas fa-seedling text-lg"></i> <span>الأذكار</span></button>
        <button onclick="navigate('qibla')"   class="nav-btn flex flex-col items-center" id="nav-qibla">  <i class="fas fa-kaaba text-lg"></i>  <span>القبلة</span></button>
        <button onclick="navigate('tasbih')"  class="nav-btn flex flex-col items-center" id="nav-tasbih"> <i class="fas fa-hands-praying text-lg"></i><span>المسبحة</span></button>
        <button onclick="navigate('dua')"     class="nav-btn flex flex-col items-center" id="nav-dua">    <i class="fas fa-hand-holding-heart text-lg"></i><span>الدعاء</span></button>
    </nav>

    <!-- Floating buttons (top-left since RTL, so displayed on right visually) -->
    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="toggleTheme()" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid var(--border-color);color:var(--text-gold);">
            <i id="theme-icon" class="fas fa-moon text-base"></i>
        </button>
        <button onclick="navigate('settings')" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid var(--border-color);color:var(--text-gold);">
            <i class="fas fa-cog text-base"></i>
        </button>
        <button onclick="navigate('donate')" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid var(--border-color);color:var(--text-gold);">
            <i class="fas fa-donate text-base"></i>
        </button>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
    // ====================== PARTICLES ======================
    particlesJS('particles-js', {
        particles: {
            number: { value: 50, density: { enable: true, value_area: 900 } },
            color: { value: '#d4a017' }, shape: { type: 'circle' },
            opacity: { value: 0.3, random: true, anim: { enable: true, speed: 0.5, opacity_min: 0.05, sync: false } },
            size: { value: 1.5, random: true },
            line_linked: { enable: false },
            move: { enable: true, speed: 0.3, direction: 'none', random: true, out_mode: 'out' }
        },
        interactivity: { events: { onhover: { enable: false }, onclick: { enable: false }, resize: true } },
        retina_detect: true
    });

    // ====================== PRELOADER ======================
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('preloader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('preloader').style.display = 'none';
                const app = document.getElementById('app');
                app.classList.remove('invisible', 'opacity-0');
                navigate('home');
            }, 1000);
        }, 2200);
    });

    // ====================== THEME ======================
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const icon = document.getElementById('theme-icon');
        const isLight = document.body.classList.contains('light-mode');
        icon.className = isLight ? 'fas fa-sun text-base' : 'fas fa-moon text-base';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }
    (function() {
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('theme-icon').className = 'fas fa-sun text-base';
        }
    })();

    // ====================== TOAST ======================
    function showToast(msg, icon = '✦') {
        const toast = document.getElementById('toast');
        toast.innerHTML = `<span style="margin-left:6px;opacity:0.7">${icon}</span>${msg}`;
        toast.className = 'show';
        setTimeout(() => { toast.className = ''; setTimeout(() => toast.style.visibility = 'hidden', 300); }, 3500);
    }

    // ====================== NAVIGATION ======================
    function navigate(page) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const nav = document.getElementById(`nav-${page}`);
        if (nav) nav.classList.add('active');

        const container = document.getElementById('dynamic-content');
        container.style.opacity = '0';
        container.style.transform = 'translateY(12px)';

        setTimeout(() => {
            container.style.opacity = '';
            container.style.transform = '';
            container.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';

            switch(page) {
                case 'home':     container.innerHTML = renderHome();     initHome();    break;
                case 'quran':    container.innerHTML = renderQuran();    initQuran();   break;
                case 'hadith':   container.innerHTML = renderHadith();   initHadith();  break;
                case 'adhkar':   container.innerHTML = renderAdhkar();               break;
                case 'qibla':    container.innerHTML = renderQibla();    initQibla();   break;
                case 'tasbih':   container.innerHTML = renderTasbih();   initTasbih();  break;
                case 'dua':      container.innerHTML = renderDua();                  break;
                case 'settings': container.innerHTML = renderSettings();             break;
                case 'donate':   container.innerHTML = renderDonate();               break;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 180);
    }

    // ====================== HOME PAGE ======================
    function renderHome() {
        return `
        <div class="text-center fade-in">
            <div class="mb-8">
                <h2 class="holy-glow mb-3" style="font-family:'Noto Naskh Arabic';font-size:1.7rem;line-height:1.8;">
                    بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ
                </h2>
                <p style="font-family:'Noto Naskh Arabic';font-size:1.2rem;color:var(--text-muted);">
                    إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ
                </p>
            </div>

            <div class="my-8 relative inline-block">
                <div style="position:absolute;inset:-24px;border-radius:50%;border:1px solid rgba(212,160,23,0.15);animation:ornamentSpin 12s linear infinite;"></div>
                <div style="position:absolute;inset:-12px;border-radius:50%;border:1px dashed rgba(212,160,23,0.08);"></div>
                <div style="padding:40px 48px;background:radial-gradient(ellipse,rgba(212,160,23,0.06),transparent 70%);border-radius:50%;position:relative;">
                    <h1 style="font-family:'Aref Ruqaa Ink';font-size:4rem;color:var(--text-gold);text-shadow:0 0 40px rgba(212,160,23,0.4);line-height:1.25;">ذِكرَىٰ<br>ضِيَاء</h1>
                </div>
            </div>

            <div class="divider" style="margin:24px 0;">
                <i class="fas fa-star-and-crescent" style="font-size:14px;"></i>
            </div>

            <p style="color:var(--text-muted);font-size:0.95rem;line-height:1.9;">
                صدقة جارية عن روح<br>
                <strong style="color:var(--gold-bright);font-size:1.1rem;">المرحوم ضياء الدين صالح الزعبي</strong><br>
                <span style="font-size:0.8rem;opacity:0.6;">رحمه الله وأسكنه فسيح جناته</span>
            </p>

            <!-- Prayer Times -->
            <div class="card mt-8 p-4" id="prayerTimesCard">

    function initHome() {
        // Prayer times
        navigator.geolocation ? navigator.geolocation.getCurrentPosition(pos => {
            fetchPrayerTimes(pos.coords.latitude, pos.coords.longitude);
        }, () => fetchPrayerTimes(26.2235, 50.1989)) // Fallback: Khobar, SA
        : fetchPrayerTimes(26.2235, 50.1989);
    }

    function fetchPrayerTimes(lat, lng) {
        const today = new Date();
        const dateStr = `${today.getDate()}-${today.getMonth()+1}-${today.getFullYear()}`;
        fetch(`https://api.aladhan.com/v1/timings/${dateStr}?latitude=${lat}&longitude=${lng}&method=4`)
            .then(r => r.json())
            .then(data => {
                const t = data.data.timings;
                const prayers = [
                    { name:'الفجر',  time: t.Fajr    },
                    { name:'الشروق', time: t.Sunrise  },
                    { name:'الظهر',  time: t.Dhuhr   },
                    { name:'العصر',  time: t.Asr     },
                    { name:'المغرب', time: t.Maghrib  },
                    { name:'العشاء', time: t.Isha    },
                ];
                const now = today.getHours() * 60 + today.getMinutes();
                const pTimes = prayers.map(p => {
                    const [h, m] = p.time.split(':').map(Number);
                    return { ...p, mins: h * 60 + m };
                });
                const nextIdx = pTimes.findIndex(p => p.mins > now);

                const dateEl = document.getElementById('prayerDate');
                const row = document.getElementById('prayerTimesRow');
                if (!dateEl || !row) return;

                dateEl.textContent = data.data.date.readable;
                row.innerHTML = prayers.map((p, i) => `
                    <div class="prayer-card ${i === nextIdx ? 'next-prayer' : ''}">
                        <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">${p.name}</div>
                        <div style="font-size:13px;font-weight:600;color:${i===nextIdx?'var(--text-gold)':'var(--text-primary)'};">${p.time}</div>
                        ${i===nextIdx?'<div style="font-size:9px;color:var(--text-gold);margin-top:2px;">التالية</div>':''}
                    </div>
                `).join('');
            }).catch(() => {
                const row = document.getElementById('prayerTimesRow');
                if (row) row.innerHTML = '<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:8px;">تعذّر تحميل مواقيت الصلاة</p>';
            });
    }

    // ====================== QURAN ======================
    const quranReciters = {
        "abdul_basit": { name: "عبد الباسط عبد الصمد",   base: "https://everyayah.com/data/Abdul_Basit_Mujawwad_128kbps/" },
        "sudais":       { name: "عبد الرحمن السديس",     base: "https://everyayah.com/data/Abdurrahmaan_As-Sudais_192kbps/" },
        "afasy":        { name: "مشاري العفاسي",          base: "https://everyayah.com/data/Alafasy_128kbps/" },
        "minshawi":     { name: "محمد صديق المنشاوي",    base: "https://everyayah.com/data/Minshawi_Mujawwad_192kbps/" }
    };
    let currentReciter = 'abdul_basit';
    let currentAudio = null;

    function renderQuran() {
        return `
        <div>
            <h2 class="holy-glow text-2xl mb-5 font-bold">القرآن الكريم</h2>
            <div class="flex gap-3 mb-4 flex-wrap">
                <select id="surahSelect" class="search-box flex-1 min-w-0" onchange="loadSurah()">
                    <option value="">— اختر السورة —</option>
                </select>
                <select id="reciterSelect" class="search-box" onchange="changeReciter()" style="min-width:140px;">
                    ${Object.entries(quranReciters).map(([k,v]) => `<option value="${k}">${v.name}</option>`).join('')}
                </select>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="quranSearch" placeholder="ابحث في القرآن..." class="search-box flex-1" oninput="debounceSearch()">
            </div>
            <div class="flex gap-2 mb-4">
                <input type="number" id="pageInput" placeholder="رقم الصفحة" class="search-box flex-1" min="1" max="604">
                <button onclick="searchByPage()" class="btn-ghost">اذهب</button>
                <input type="number" id="juzInput" placeholder="الجزء" class="search-box flex-1" min="1" max="30">
                <button onclick="searchByJuz()" class="btn-ghost">اذهب</button>
            </div>
            <div id="quranDisplay" class="space-y-4"></div>
        </div>`;
    }

    function initQuran() {
        const select = document.getElementById('surahSelect');
        document.getElementById('reciterSelect').value = currentReciter;
        fetch('https://api.alquran.cloud/v1/surah')
            .then(r => r.json())
            .then(data => {
                data.data.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.number;
                    opt.text = `${s.number}. ${s.name} (${s.numberOfAyahs} آية)`;
                    select.appendChild(opt);
                });
                select.value = 1;
                loadSurah();
            });
    }

    function changeReciter() {
        currentReciter = document.getElementById('reciterSelect').value;
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    }

    function loadSurah() {
        const surah = document.getElementById('surahSelect').value;
        if (!surah) return;
        const container = document.getElementById('quranDisplay');
        container.innerHTML = `<div class="space-y-3">${[1,2,3].map(()=>`<div class="skeleton" style="height:90px;border-radius:16px;"></div>`).join('')}</div>`;

        fetch(`https://api.alquran.cloud/v1/surah/${surah}/quran-uthmani`)
            .then(r => r.json())
            .then(data => {
                container.innerHTML = '';
                data.data.ayahs.forEach(ayah => {
                    container.appendChild(buildAyahCard(ayah.text, ayah.numberInSurah, ayah.number));
                });
            });
    }

    function buildAyahCard(text, numInSurah, globalNum) {
        const div = document.createElement('div');
        div.className = 'card p-4';

        const header = document.createElement('div');
        header.className = 'flex items-start gap-3 mb-2';

        const badge = document.createElement('span');
        badge.className = 'ayah-num';
        badge.textContent = numInSurah;

        const p = document.createElement('p');
        p.style.cssText = "font-family:'Amiri Quran';font-size:1.35rem;line-height:2.1;flex:1;";
        p.textContent = text;

        header.appendChild(badge);
        header.appendChild(p);
        div.appendChild(header);

        const btnRow = document.createElement('div');
        btnRow.className = 'flex gap-2 flex-wrap';
        btnRow.style.marginTop = '8px';

        const playBtn = document.createElement('button');
        playBtn.className = 'audio-ctrl';
        playBtn.innerHTML = '<i class="fas fa-play text-xs"></i> استمع';
        playBtn.onclick = () => playAyah(globalNum, playBtn);

        const tafsirBtn = document.createElement('button');
        tafsirBtn.className = 'audio-ctrl';
        tafsirBtn.innerHTML = '<i class="fas fa-comment-alt text-xs"></i> تفسير';
        tafsirBtn.onclick = () => loadTafsir(globalNum, div, tafsirBtn);

        const shareBtn = document.createElement('button');
        shareBtn.className = 'audio-ctrl';
        shareBtn.innerHTML = '<i class="fas fa-heart text-xs"></i> أهدِ';
        shareBtn.onclick = () => showToast('أهديت هذه الآية للمرحوم ضياء الدين', '🌿');

        btnRow.append(playBtn, tafsirBtn, shareBtn);
        div.appendChild(btnRow);
        return div;
    }

    function playAyah(ayahNumber, btn) {
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        const base = quranReciters[currentReciter].base;
        currentAudio = new Audio(`${base}${String(ayahNumber).padStart(3,'0')}.mp3`);
        currentAudio.play();
        showToast('جاري تشغيل التلاوة ♪');
        if (btn) {
            btn.innerHTML = '<i class="fas fa-pause text-xs"></i> إيقاف';
            currentAudio.onended = () => { btn.innerHTML = '<i class="fas fa-play text-xs"></i> استمع'; };
            btn.onclick = () => { currentAudio.pause(); currentAudio = null; btn.innerHTML = '<i class="fas fa-play text-xs"></i> استمع'; btn.onclick = () => playAyah(ayahNumber, btn); };
        }
    }

    function loadTafsir(ayahNumber, parentDiv, btn) {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xs"></i>';
        const existing = parentDiv.querySelector('.tafsir-box');
        if (existing) { existing.remove(); btn.innerHTML = '<i class="fas fa-comment-alt text-xs"></i> تفسير'; return; }
        fetch(`https://api.alquran.cloud/v1/ayah/${ayahNumber}/ar.muyassar`)
            .then(r => r.json())
            .then(data => {
                btn.innerHTML = '<i class="fas fa-comment-alt text-xs"></i> إخفاء';
                const p = document.createElement('div');
                p.className = 'tafsir-box';
                p.style.cssText = 'font-size:0.85rem;color:var(--text-muted);margin-top:10px;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;border-top:1px solid var(--border-color);line-height:1.8;';
                p.textContent = data.data.text;
                parentDiv.appendChild(p);
            });
    }

    let searchTimeout;
    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchQuran(), 600);
    }

    function searchQuran() {
        const query = document.getElementById('quranSearch').value.trim();
        if (query.length < 2) return;
        const container = document.getElementById('quranDisplay');
        container.innerHTML = `<div class="skeleton" style="height:60px;border-radius:12px;"></div>`;
        // Use Arabic Quran text search
        fetch(`https://api.alquran.cloud/v1/search/${encodeURIComponent(query)}/all/ar`)
            .then(r => r.json())
            .then(data => {
                if (!data.data || !data.data.matches || data.data.matches.length === 0) {
                    container.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:20px;">لا توجد نتائج لـ "${query}"</p>`;
                    return;
                }
                container.innerHTML = `<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">${data.data.count} نتيجة</p>`;
                data.data.matches.slice(0, 15).forEach(m => {
                    container.appendChild(buildAyahCard(m.text, m.numberInSurah, m.number));
                });
            });
    }

    function searchByPage() {
        const page = document.getElementById('pageInput').value;
        if (!page || page < 1 || page > 604) return;
        const container = document.getElementById('quranDisplay');
        container.innerHTML = `<div class="skeleton" style="height:60px;border-radius:12px;"></div>`;
        fetch(`https://api.alquran.cloud/v1/page/${page}/quran-uthmani`)
            .then(r => r.json())
            .then(data => {
                container.innerHTML = `<p style="font-size:13px;color:var(--text-gold);margin-bottom:12px;">الصفحة ${page}</p>`;
                data.data.ayahs.forEach(a => {
                    container.appendChild(buildAyahCard(a.text, a.numberInSurah, a.number));
                });
            });
    }

    function searchByJuz() {
        const juz = document.getElementById('juzInput').value;
        if (!juz || juz < 1 || juz > 30) return;
        const container = document.getElementById('quranDisplay');
        container.innerHTML = `<div class="skeleton" style="height:60px;border-radius:12px;"></div>`;
        fetch(`https://api.alquran.cloud/v1/juz/${juz}/quran-uthmani`)
            .then(r => r.json())
            .then(data => {
                container.innerHTML = `<p style="font-size:13px;color:var(--text-gold);margin-bottom:12px;">الجزء ${juz}</p>`;
                data.data.ayahs.forEach(a => {
                    container.appendChild(buildAyahCard(a.text, a.numberInSurah, a.number));
                });
            });
    }

    function renderHadith() {

    function initHadith() { displayHadith(ahadith); }

        const display = document.getElementById(progId.replace('prog-', 'cnt-'));
        let count = 0;
        btn.textContent = `${count} / ${total}`;
        btn.style.cursor = 'pointer';
        if (display) display.style.display = 'block';

        function tap() {
            if (count >= total) return;
            count++;
            btn.textContent = `${count} / ${total}`;
            if (display) display.textContent = `${count} / ${total}`;
            const progEl = document.getElementById(progId);
            if (progEl) progEl.style.width = `${(count/total)*100}%`;

            </button>
        </div>`;

    function initQibla() {
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', handleOrientation, true);
        }
    }

    function handleOrientation(event) {
        let alpha = event.webkitCompassHeading || Math.abs(event.alpha - 360);
        if (!alpha) return;
        if (alpha < 0) alpha += 360;
        navigator.geolocation && navigator.geolocation.getCurrentPosition(pos => {
            const qiblaBearing = calculateQibla(pos.coords.latitude, pos.coords.longitude);
            const needle = document.getElementById('needle');
            if (needle) {
                const rotation = alpha - qiblaBearing;
                needle.style.transform = `translateX(-50%) translateY(-100%) rotate(${rotation}deg)`;
            }
        });
    }

    function calculateQibla(lat, lng) {
        const deltaLng = (39.8262 - lng) * Math.PI / 180;
        const latRad = lat * Math.PI / 180;
        const meccaLat = 21.4225 * Math.PI / 180;
        const y = Math.sin(deltaLng) * Math.cos(meccaLat);
        const x = Math.cos(latRad) * Math.sin(meccaLat) - Math.sin(latRad) * Math.cos(meccaLat) * Math.cos(deltaLng);
        let bearing = Math.atan2(y, x) * 180 / Math.PI;
        return (bearing + 360) % 360;
    }

    function requestQibla() {
        if (!navigator.geolocation) { showToast('المتصفح لا يدعم تحديد الموقع'); return; }
        document.getElementById('qiblaStatus').textContent = 'جاري تحديد موقعك...';
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            const qibla = calculateQibla(lat, lng);
            document.getElementById('qiblaStatus').textContent = `القبلة على بُعد ${qibla.toFixed(1)}° من الشمال`;
            const needle = document.getElementById('needle');
            if (needle) needle.style.transform = `translateX(-50%) translateY(-100%) rotate(${qibla}deg)`;
            showToast('تم تحديد اتجاه القبلة ✓', '🕋');
        }, () => showToast('تعذّر الوصول للموقع'));
    }

    function initTasbih() {
        const circleDiv = document.getElementById('tasbihCircle');
        circleDiv.innerHTML = '';
        const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
        svg.setAttribute("viewBox","0 0 110 110");

        // Track circle
        const track = document.createElementNS("http://www.w3.org/2000/svg","circle");
        track.setAttribute("cx","55");track.setAttribute("cy","55");track.setAttribute("r","46");
        track.setAttribute("fill","none");track.setAttribute("stroke","rgba(74,63,107,0.5)");track.setAttribute("stroke-width","1.5");
        svg.appendChild(track);

        // 33 beads
        for(let i = 0; i < 33; i++) {
            const angle = (i / 33) * 2 * Math.PI;
            const x = 55 + 44 * Math.cos(angle);
            const y = 55 + 44 * Math.sin(angle);
            const bead = document.createElementNS("http://www.w3.org/2000/svg","circle");
            bead.setAttribute("cx", x); bead.setAttribute("cy", y); bead.setAttribute("r","4");
            bead.setAttribute("fill","var(--bead-color)");
            bead.setAttribute("class","bead-circle");
            bead.dataset.index = i;
            svg.appendChild(bead);
        }

        // Indicator ring
        const indicator = document.createElementNS("http://www.w3.org/2000/svg","circle");
        indicator.setAttribute("cx","55");indicator.setAttribute("cy","11");indicator.setAttribute("r","7");
        indicator.setAttribute("fill","none");indicator.setAttribute("stroke","rgba(212,160,23,0.5)");indicator.setAttribute("stroke-width","1.5");
        svg.appendChild(indicator);

        // Center text (phrase display)
        const centerText = document.createElementNS("http://www.w3.org/2000/svg","text");
        centerText.setAttribute("x","55");centerText.setAttribute("y","52");
        centerText.setAttribute("text-anchor","middle");centerText.setAttribute("font-size","5");
        centerText.setAttribute("fill","rgba(212,160,23,0.6)");centerText.id="tasbihCenter";
        centerText.textContent="سبحان الله";
        svg.appendChild(centerText);

        circleDiv.appendChild(svg);

        let currentBead = 0;
        const beads = svg.querySelectorAll('.bead-circle');

        function updateCenterText() {
            const phrase = document.getElementById('dhikrPhrase').value;
            const el = document.getElementById('tasbihCenter');
            if (el) el.textContent = phrase.length > 12 ? phrase.substring(0,12)+'…' : phrase;
        }
        document.getElementById('dhikrPhrase').onchange = updateCenterText;
        updateCenterText();

        document.getElementById('tapBtn').onclick = () => {
            if (currentBead >= 33) return;
            if (currentBead > 0) {
                beads[currentBead-1].setAttribute("fill","var(--bead-color)");
                beads[currentBead-1].setAttribute("r","4");
            }
            beads[currentBead].setAttribute("fill","#ffd700");
            beads[currentBead].setAttribute("r","5");
            currentBead++;
            document.getElementById('counter').textContent = `${currentBead} / 33`;
            playTick();
            if (navigator.vibrate) navigator.vibrate(20);

            if (currentBead === 33) {
                tasbihTotalDedications++;
                localStorage.setItem('tasbihDedications', tasbihTotalDedications);
                document.getElementById('rewardCount').textContent = tasbihTotalDedications;
                showToast('أهديت ثواب التسبيح للمرحوم ضياء الدين', '🌿');
                setTimeout(() => {
                    beads.forEach(b => { b.setAttribute("fill","var(--bead-color)"); b.setAttribute("r","4"); });
                    currentBead = 0;
                    document.getElementById('counter').textContent = "0 / 33";
                }, 900);
            }
        };
    }

    function playTick() {
        if (localStorage.getItem('sound') === 'false') return;
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.value = 1400;
            gain.gain.setValueAtTime(0.04, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }

        "الهم والحزن":          ["اللَّهُمَّ إِنِّي عَبْدُكَ وَابْنُ عَبْدِكَ... اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَالْعَجْزِ وَالْكَسَلِ، وَالْبُخْلِ وَالْجُبْنِ، وَضَلَعِ الدَّيْنِ، وَغَلَبَةِ الرِّجَالِ"],
        "قبل السلام في الصلاة": ["اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ عَذَابِ جَهَنَّمَ، وَمِنْ عَذَابِ الْقَبْرِ، وَمِنْ فِتْنَةِ الْمَحْيَا وَالْمَمَاتِ، وَمِنْ شَرِّ فِتْنَةِ الْمَسِيحِ الدَّجَّالِ"],
        "السجود":               ["سُبْحَانَ رَبِّيَ الْأَعْلَى", "اللَّهُمَّ لَكَ سَجَدْتُ وَبِكَ آمَنْتُ وَلَكَ أَسْلَمْتُ"],
        "الركوع":               ["سُبْحَانَ رَبِّيَ الْعَظِيمِ"],
        "دعاء الاستفتاح":       ["اللَّهُمَّ بَاعِدْ بَيْنِي وَبَيْنَ خَطَايَايَ كَمَا بَاعَدْتَ بَيْنَ الْمَشْرِقِ وَالْمَغْرِبِ..."],
        "القنوت":               ["اللَّهُمَّ اهْدِنِي فِيمَنْ هَدَيْتَ، وَعَافِنِي فِيمَنْ عَافَيْتَ..."],
        "دخول المسجد":          ["بِسْمِ اللَّهِ وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ اللَّهِ، اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ"],
        "عند الأذان":           ["اللَّهُمَّ رَبَّ هَذِهِ الدَّعْوَةِ التَّامَّةِ وَالصَّلَاةِ الْقَائِمَةِ، آتِ مُحَمَّدًا الْوَسِيلَةَ وَالْفَضِيلَةَ..."],
    };

    function renderDua() {
        return `
        <div class="fade-in">
            <h2 class="holy-glow text-2xl mb-5 font-bold">الدعاء</h2>
            <div class="flex flex-wrap gap-2 mb-5">
                ${Object.keys(duas).map(cat =>
                    `<button onclick="showDuaCategory('${cat}',this)" class="cat-pill">${cat}</button>`
                ).join('')}
            </div>
            <div id="duaContent" class="space-y-3"></div>
        </div>`;
    }

    function showDuaCategory(cat, btn) {
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        const list = duas[cat] || [];
        document.getElementById('duaContent').innerHTML = list.map(d => `
            <div class="card p-4">
                <p style="font-family:'Noto Naskh Arabic';font-size:1.1rem;line-height:2.1;">${d}</p>
                <div style="margin-top:10px;">
                    <button onclick="showToast('أهديت هذا الدعاء للمرحوم ضياء الدين','🌿')" class="btn-ghost" style="font-size:12px;padding:5px 16px;">
                        <i class="fas fa-hand-holding-heart"></i> ادعُ وأهدِ
                    </button>
                </div>
            </div>
        `).join('');
    }

    // ====================== SETTINGS ======================
    function renderSettings() {
        const sound = localStorage.getItem('sound') !== 'false';
        const beadStyle = localStorage.getItem('beadStyle') || 'classic';
        return `
        <div class="fade-in max-w-sm mx-auto">
            <h2 class="holy-glow text-2xl mb-5 font-bold">الإعدادات</h2>
            <div class="card p-5 space-y-5">
                <div class="toggle-wrapper">
                    <div>
                        <div style="font-size:14px;font-weight:600;">صوت التسبيح</div>
                        <div style="font-size:12px;color:var(--text-muted);">صوت نقرة عند كل خرزة</div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" ${sound?'checked':''} onchange="localStorage.setItem('sound',this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="divider" style="margin:4px 0;"><span style="font-size:11px;">المسبحة</span></div>

                <div>
                    <div style="font-size:14px;font-weight:600;margin-bottom:8px;">شكل الخرز</div>
                    <div class="flex gap-3">
                        ${[['classic','#aaa','كلاسيكي'],['colorful','#f97316','ملون'],['crystal','rgba(255,255,255,0.7)','كريستال']].map(([val,color,label]) =>
                            `<button onclick="setBeadStyle('${val}','${color}')" class="card flex-1 p-3 text-center ${beadStyle===val?'':'opacity-50'}" id="bead-${val}" style="border:none;">
                                <div style="width:16px;height:16px;border-radius:50%;background:${color};margin:0 auto 4px;"></div>
                                <div style="font-size:11px;">${label}</div>
                            </button>`
                        ).join('')}
                    </div>
                </div>

                <div class="divider" style="margin:4px 0;"><span style="font-size:11px;">الوقت</span></div>

                <div class="toggle-wrapper">
                    <div>
                        <div style="font-size:14px;font-weight:600;">تذكير أذكار الصباح</div>
                        <div style="font-size:12px;color:var(--text-muted);">تنبيه بعد الفجر</div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" ${localStorage.getItem('morningAlert')==='true'?'checked':''} onchange="localStorage.setItem('morningAlert',this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="toggle-wrapper">
                    <div>
                        <div style="font-size:14px;font-weight:600;">تذكير أذكار المساء</div>
                        <div style="font-size:12px;color:var(--text-muted);">تنبيه قبل المغرب</div>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" ${localStorage.getItem('eveningAlert')==='true'?'checked':''} onchange="localStorage.setItem('eveningAlert',this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="card p-4 mt-4 text-center">
                <p style="font-size:12px;color:var(--text-muted);line-height:1.8;">
                    هذه المنصة صدقة جارية عن روح المرحوم<br>
                    <strong style="color:var(--text-gold);">ضياء الدين صالح الزعبي</strong><br>
                    رحمه الله وأسكنه فسيح جناته
                </p>
            </div>
        </div>`;
    }

    function setBeadStyle(val, color) {
        localStorage.setItem('beadStyle', val);
        document.documentElement.style.setProperty('--bead-color', color);
        document.querySelectorAll('[id^="bead-"]').forEach(b => b.classList.add('opacity-50'));
        const el = document.getElementById(`bead-${val}`);
        if (el) el.classList.remove('opacity-50');
        showToast('تم تغيير شكل المسبحة');
    }

    // ====================== DONATE ======================
    function renderDonate() {
        return `
        <div class="fade-in max-w-sm mx-auto">
            <h2 class="holy-glow text-2xl mb-2 font-bold">تبرع وشارك في الأجر</h2>
            <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;line-height:1.7;">
                كل صدقة تجريها باسم المرحوم تضاف إلى ميزان حسناته
            </p>
            <div class="card p-5 space-y-4">
                <div>
                    <label style="font-size:13px;color:var(--text-muted);display:block;margin-bottom:6px;">الاسم (اختياري)</label>
                    <input type="text" id="donorName" placeholder="اسمك" class="form-input">
                </div>
                <div>
                    <label style="font-size:13px;color:var(--text-muted);display:block;margin-bottom:6px;">المشروع</label>
                    <select id="projectSelect" class="form-input" required>
                        <option value="">— اختر المشروع —</option>
                        <option>بناء مسجد في سوريا</option>
                        <option>دعم مدرسة قرآنية في باكستان</option>
                        <option>حفر بئر ماء في أفريقيا</option>
                        <option>توزيع مصاحف</option>
                        <option>إطعام الفقراء</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:13px;color:var(--text-muted);display:block;margin-bottom:6px;">المبلغ (بالدولار)</label>
                    <div class="flex gap-2 flex-wrap mb-3">
                        ${[10,25,50,100].map(a=>
                            `<button onclick="document.getElementById('amountInput').value=${a}" class="cat-pill flex-1" style="text-align:center;">$${a}</button>`
                        ).join('')}
                    </div>
                    <input type="number" id="amountInput" placeholder="مبلغ آخر..." class="form-input" min="1">
                </div>
                <button onclick="handleDonation()" class="btn-gold w-full" style="font-size:1rem;">
                    <i class="fas fa-heart ml-2"></i> تبرع الآن
                </button>
            </div>

            <div id="donationReceipt" style="display:none;" class="card mt-5 p-5 text-center">
                <i class="fas fa-check-circle text-4xl mb-3" style="color:#4ade80;"></i>
                <p style="color:var(--text-gold);font-size:1.1rem;font-weight:600;margin-bottom:6px;">جزاك الله خيراً</p>
                <p style="font-size:13px;color:var(--text-muted);">جعله الله صدقة جارية في ميزان المرحوم ضياء الدين.</p>
            </div>
        </div>`;
    }

    function handleDonation() {
        const project = document.getElementById('projectSelect').value;
        const amount = document.getElementById('amountInput').value;
        if (!project || !amount) { showToast('يرجى اختيار المشروع والمبلغ', '⚠️'); return; }
        document.getElementById('donationReceipt').style.display = 'block';
        showToast('شكراً! تبرعك قيد المعالجة', '💛');
    }

    // ====================== INIT ======================
    (function applyBeadStyle() {
        const val = localStorage.getItem('beadStyle');
        const colors = { classic:'#aaaaaa', colorful:'#f97316', crystal:'rgba(255,255,255,0.7)' };
        if (val && colors[val]) document.documentElement.style.setProperty('--bead-color', colors[val]);
    })();
    </script>
</body>
</html>
